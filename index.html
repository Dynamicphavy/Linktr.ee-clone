<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Linktree</title>
    </head>
    <body>
        <div class="linktree">
            <img src="profile.webp" alt="image"> <br>
            <h1>Dynamicphavy</h1>
            <h2>Just A Tech Guy</h2>
            <div class="link">
                <div class="links" onclick="goToSite('https://github.com/Dynamicphavy')">
                    <div class="icon">
                        <i class="fa-brands fa-github"></i>
                    </div>
                    <p>GitHub</p>
                </div>
                <div class="links" onclick="goToSite('https://x.com/favyjoy320')">
                    <div class="icon">
                        <i class="fa-brands fa-x-twitter"></i>
                    </div>
                    <p>Twitter</p>
                </div>
                <div class="links" onclick="goToSite('https://instagram.com/dphavy4')">
                    <div class="icon">
                        <i class="fa-brands fa-instagram"></i>
                    </div>
                    <p>Instagram</p>
                </div>
            </div>
        </div>

        <script>
            function goToSite(url) {
                window.open(url, '_blank'); //Opens in a new tab
            }
        </script>
    </body>
</html>
